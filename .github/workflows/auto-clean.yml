name: 自动聚合节点

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 聚合节点
        env:
          SUBS_URLS: ${{ secrets.SUBS_URLS }}
        run: |
          cat << 'EOF' > aggregator.py
          import os
          import base64
          import urllib.request

          def fetch_url(url):
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=35) as response:
                      return response.read()
              except Exception as e:
                  print(f"❌ 获取失败: {url} | {e}")
                  return None

          def decode_content(data):
              if not data: return ""
              text = data.decode('utf-8', errors='ignore').strip()
              if '://' not in text[:100]:
                  try:
                      return base64.b64decode(text + '===').decode('utf-8')
                  except:
                      pass
              return text

          urls = [u.strip() for u in os.getenv('SUBS_URLS', '').splitlines() if u.strip()]
          nodes = []

          print(f"共发现 {len(urls)} 个订阅链接")

          for url in urls:
              print(f"正在处理: {url}")
              raw = fetch_url(url)
              if raw:
                  content = decode_content(raw)
                  for line in content.splitlines():
                      line = line.strip()
                      if any(line.startswith(p) for p in ['vmess://','vless://','trojan://','ss://','hysteria2://']):
                          nodes.append(line)

          unique_nodes = list(dict.fromkeys(nodes))
          print(f"✅ 聚合完成，共 {len(unique_nodes)} 个节点")

          if unique_nodes:
              combined = '\n'.join(unique_nodes)
              encoded = base64.b64encode(combined.encode('utf-8')).decode('utf-8')
              
              with open('sub.txt', 'w') as f:
                  f.write(encoded)
              with open('sub_plain.txt', 'w') as f:
                  f.write(combined)
              
              print("✅ 文件生成成功")
          EOF

          python3 aggregator.py

      - name: 提交更新
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if [ -f sub.txt ] && git diff --quiet sub.txt 2>/dev/null; then
            echo "没有变化，跳过提交"
          elif [ -f sub.txt ]; then
            git add sub.txt sub_plain.txt
            git commit -m "Auto update nodes $(date '+%Y-%m-%d %H:%M:%S UTC')"
            git push
            echo "✅ 成功提交并推送！"
          else
            echo "⚠️ 未生成 sub.txt"
          fi
